version: '3.8'

services:
  flow2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: flow2api:dev
    volumes:
      - ./src:/app/src
    command:
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
